<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <radialGradient id="blueGlow">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="purpleGlow">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="90"/>
    </filter>

  </defs>

  <rect width="1280" height="320" rx="24" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="1080" cy="70" r="170" fill="url(#blueGlow)" filter="url(#blur)"/>
  <circle cx="240" cy="280" r="140" fill="url(#purpleGlow)" filter="url(#blur)"/>

  <!-- Decorative lines -->
  <line x1="70" y1="70" x2="1210" y2="70" stroke="#1F2937"/>
  <line x1="70" y1="250" x2="1210" y2="250" stroke="#1F2937"/>

  <!-- Name -->
  <text
    x="640"
    y="120"
    text-anchor="middle"
    fill="#F8FAFC"
    font-size="52"
    font-weight="700"
    font-family="Segoe UI, Arial">

    Anurag Verma

  </text>

  <!-- Subtitle -->
  <text
    x="640"
    y="160"
    text-anchor="middle"
    fill="#9CA3AF"
    font-size="22"
    font-family="Segoe UI, Arial">

    Full Stack Developer • AI Builder • Founder @ OpportunityX

  </text>

  <!-- Tagline -->
  <text
    x="640"
    y="210"
    text-anchor="middle"
    fill="#60A5FA"
    font-size="30"
    font-weight="600"
    font-family="Segoe UI, Arial">

    Discover. Apply. Grow.

  </text>

</svg>
